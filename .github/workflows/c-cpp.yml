name: Arduino Build CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Linux is faster for Arduino builds

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install PlatformIO
      run: pip install -U platformio

    - name: Build Project
      # This runs the build inside your specific subfolder
      run: pio run -d "code/Sem7HiTech_ClankerShooter"

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: Gun-Firmware
        path: code/Sem7HiTech_ClankerShooter/.pio/build/*/firmware.hex