name: Windows Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure CMake
      # We tell CMake to look inside your specific code folder
      run: cmake -S "code/Sem7HiTech_ClankerShooter" -B build

    - name: Build Project
      # This compiles the code
      run: cmake --build build --config Release

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClankerShooter-Build
        path: build/Release/
